<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight API Test</title>
  <style>
    body {
      font-family: Georgia, serif;
      margin: 2rem;
      line-height: 1.5;
      background: #f8f7f4;
      color: #1f2937;
    }

    .card {
      max-width: 680px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    button {
      border: 0;
      background: #1d4ed8;
      color: #fff;
      font-size: 1rem;
      border-radius: 8px;
      padding: 0.6rem 0.95rem;
      cursor: pointer;
    }

    pre {
      margin-top: 1rem;
      background: #111827;
      color: #f9fafb;
      padding: 0.75rem;
      border-radius: 8px;
      overflow: auto;
      max-height: 360px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Google Flights API Test</h1>
    <p>Click the button to fetch data. Open DevTools console to inspect full output.</p>
    <button id="runBtn" type="button">Run Fetch</button>
    <pre id="output">Waiting...</pre>
  </main>

  <script src="./test.js"></script>
  <script>
    const output = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');

    runBtn.addEventListener('click', async () => {
      output.textContent = 'Loading...';

      try {
        const results = await window.runFlightsDemo();
        output.textContent = JSON.stringify(results, null, 2);
      } catch (err) {
        output.textContent = `Error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
